<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>个人信息卡片 | 高级Web课程作业</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            margin: 0;
        }

        .card {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 2.5rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35), 0 2px 8px rgba(0, 0, 0, 0.05);
            padding: 2rem 2rem 2.2rem;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            backdrop-filter: blur(0px);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 55px -14px rgba(0, 0, 0, 0.4);
        }

        .card h1 {
            text-align: center;
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2c3e66, #1a2a44);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1.5rem;
            letter-spacing: -0.3px;
            border-left: 4px solid #3b82f6;
            padding-left: 1rem;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .avatar-section {
            display: flex;
            justify-content: center;
            margin-bottom: 1.8rem;
            position: relative;
        }

        .avatar-wrapper {
            position: relative;
            cursor: pointer;
            transition: filter 0.2s;
        }

        .avatar-wrapper:hover .avatar-img {
            filter: brightness(0.92);
            transform: scale(1.02);
        }

        .avatar-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.25s ease;
            background: #f0f2f5;
        }

        .upload-hint {
            position: absolute;
            bottom: 6px;
            right: 6px;
            background: #3b82f6;
            color: white;
            border-radius: 30px;
            padding: 6px 8px;
            font-size: 12px;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            pointer-events: none;
            transition: 0.2s;
            backdrop-filter: blur(2px);
            background: rgba(59, 130, 246, 0.85);
        }

        .avatar-wrapper:hover .upload-hint {
            background: #2563eb;
            transform: scale(1.02);
        }

        #avatarUpload {
            display: none;
        }

        .info-field {
            margin-bottom: 1.6rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .info-field label {
            font-weight: 600;
            color: #1e293b;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .info-field label i {
            font-style: normal;
            font-weight: 400;
            font-size: 1.1rem;
        }

        .editable-input {
            width: 100%;
            padding: 0.85rem 1rem;
            font-size: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 1.2rem;
            background-color: #fefefe;
            transition: all 0.2s;
            outline: none;
            font-weight: 500;
            color: #0f172a;
        }

        .editable-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background-color: #ffffff;
        }

        #nameInput {
            font-weight: 600;
            font-size: 1.1rem;
        }

        #bioInput {
            resize: vertical;
            min-height: 85px;
            line-height: 1.4;
        }

        .display-card {
            background: #f8fafc;
            border-radius: 1.8rem;
            padding: 1.3rem 1.5rem;
            margin: 1rem 0 1.8rem 0;
            border: 1px solid #e9eef3;
            transition: all 0.2s;
            box-shadow: inset 0 1px 2px #ffffff80, 0 4px 8px rgba(0, 0, 0, 0.02);
        }

        .display-name {
            font-size: 1.7rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 0.6rem;
            word-break: break-word;
            letter-spacing: -0.2px;
            border-left: 4px solid #3b82f6;
            padding-left: 0.75rem;
        }

        .display-bio {
            font-size: 1rem;
            line-height: 1.5;
            color: #334155;
            background: #ffffffcc;
            padding: 0.6rem 0.8rem;
            border-radius: 1rem;
            margin-top: 0.3rem;
            word-break: break-word;
        }

        .edit-area {
            margin: 1.5rem 0 1rem;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: #5b6e8c;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title span {
            background: #e2e8f0;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-size: 0.7rem;
        }

        .save-btn {
            width: 100%;
            background: linear-gradient(95deg, #3b82f6, #2563eb);
            border: none;
            padding: 0.9rem;
            border-radius: 3rem;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(37, 99, 235, 0.3);
            margin-top: 0.8rem;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }

        .save-btn:hover {
            background: linear-gradient(95deg, #2563eb, #1d4ed8);
            transform: scale(0.98);
            box-shadow: 0 6px 12px rgba(37, 99, 235, 0.4);
        }

        .save-btn:active {
            transform: scale(0.96);
        }

        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1e293b;
            color: white;
            padding: 0.6rem 1.4rem;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            z-index: 1000;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(8px);
            background: rgba(30, 41, 59, 0.9);
        }

        .toast-msg.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .theme-switch {
            position: absolute;
            top: 20px;
            right: 25px;
            background: #ffffffcc;
            backdrop-filter: blur(8px);
            border: none;
            border-radius: 60px;
            padding: 8px 14px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.2s;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 10;
        }

        .theme-switch:hover {
            background: white;
            transform: scale(1.02);
        }

        body.dark-theme {
            background: linear-gradient(145deg, #1e293b, #0f172a);
        }

        body.dark-theme .card {
            background: #1e293bdd;
            backdrop-filter: blur(2px);
            background: #1f2a3e;
            box-shadow: 0 25px 45px -12px black;
        }

        body.dark-theme .card h1 {
            background: linear-gradient(135deg, #cbd5e1, #94a3b8);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        body.dark-theme .display-card {
            background: #0f172a;
            border-color: #334155;
        }

        body.dark-theme .display-name {
            color: #f1f5f9;
        }

        body.dark-theme .display-bio {
            background: #1e293b;
            color: #cbd5e6;
        }

        body.dark-theme .editable-input {
            background: #0f172a;
            border-color: #475569;
            color: #e2e8f0;
        }

        body.dark-theme .editable-input:focus {
            border-color: #60a5fa;
            background: #1e293b;
        }

        body.dark-theme .info-field label {
            color: #cbd5e1;
        }

        body.dark-theme .section-title {
            color: #94a3b8;
        }

        body.dark-theme .save-btn {
            background: linear-gradient(95deg, #2563eb, #1e40af);
        }

        @media (max-width: 550px) {
            .card {
                padding: 1.5rem;
            }
            .display-name {
                font-size: 1.4rem;
            }
            .avatar-img {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>

<button class="theme-switch" id="themeToggleBtn" aria-label="切换深色/浅色主题">
    🌙 深色主题
</button>

<div class="card">
    <h1>📇 个人信息卡片</h1>

    <div class="avatar-section">
        <div class="avatar-wrapper" id="avatarWrapper">
            <img class="avatar-img" id="avatarImg" src="https://ui-avatars.com/api/?background=3b82f6&color=fff&rounded=true&size=120&bold=true&fontsize=0.45&name=User" alt="个人头像">
            <div class="upload-hint">📷 更换</div>
        </div>
        <input type="file" id="avatarUpload" accept="image/jpeg,image/png,image/jpg,image/webp">
    </div>

    <div class="display-card">
        <div class="display-name" id="displayName">王小萌</div>
        <div class="display-bio" id="displayBio">热爱前端与设计，保持好奇，持续学习。</div>
    </div>

    <div class="edit-area">
        <div class="section-title">
            ✏️ 编辑个人信息 <span>即时修改后保存</span>
        </div>
        <div class="info-field">
            <label>👤 姓名</label>
            <input type="text" id="nameInput" class="editable-input" placeholder="输入你的姓名" value="王小萌">
        </div>
        <div class="info-field">
            <label>📝 个人简介</label>
            <textarea id="bioInput" class="editable-input" rows="3" placeholder="介绍一下你自己...">热爱前端与设计，保持好奇，持续学习。</textarea>
        </div>
    </div>

    <button class="save-btn" id="saveBtn">
        💾 保存修改
    </button>
</div>

<div id="toastMsg" class="toast-msg">✨ 信息已更新</div>

<script>
    (function() {
        const avatarImg = document.getElementById('avatarImg');
        const avatarUploadInput = document.getElementById('avatarUpload');
        const avatarWrapper = document.getElementById('avatarWrapper');
        
        const displayNameElem = document.getElementById('displayName');
        const displayBioElem = document.getElementById('displayBio');
        
        const nameInput = document.getElementById('nameInput');
        const bioInput = document.getElementById('bioInput');
        
        const saveBtn = document.getElementById('saveBtn');
        const toastMsgDiv = document.getElementById('toastMsg');
        
        const themeToggle = document.getElementById('themeToggleBtn');
        
        let toastTimer = null;
        function showToast(message, duration = 2000) {
            if (toastTimer) clearTimeout(toastTimer);
            toastMsgDiv.textContent = message || '✨ 信息已更新';
            toastMsgDiv.classList.add('show');
            toastTimer = setTimeout(() => {
                toastMsgDiv.classList.remove('show');
            }, duration);
        }
        
        function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('image/')) {
                showToast('❌ 请选择图片文件 (jpg, png, webp等)', 1500);
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                showToast('⚠️ 图片大小不能超过5MB', 1500);
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                avatarImg.src = e.target.result;
                showToast('🖼️ 头像已更新', 1200);
            };
            reader.onerror = function() {
                showToast('❌ 读取图片失败', 1200);
            };
            reader.readAsDataURL(file);
        }
        
        function triggerFileUpload() {
            avatarUploadInput.click();
        }
        
        function saveProfile() {
            let newName = nameInput.value.trim();
            let newBio = bioInput.value.trim();
            
            if (newName === "") {
                newName = "未填写姓名";
                nameInput.value = newName;
                showToast("姓名不能为空，已设为默认", 1500);
            }
            if (newBio === "") {
                newBio = "这个人很懒，还没有填写简介～";
                bioInput.value = newBio;
                showToast("简介为空，已填充默认文案", 1500);
            }
            
            displayNameElem.textContent = newName;
            displayBioElem.textContent = newBio;
            
            showToast("✅ 个人信息已保存！", 1500);
        }
        
        function loadStoredData() {
            const storedName = localStorage.getItem('profile_name');
            const storedBio = localStorage.getItem('profile_bio');
            const storedAvatar = localStorage.getItem('profile_avatar');
            
            if (storedName) {
                nameInput.value = storedName;
                displayNameElem.textContent = storedName;
            } else {
                const defaultName = "王小萌";
                nameInput.value = defaultName;
                displayNameElem.textContent = defaultName;
            }
            if (storedBio) {
                bioInput.value = storedBio;
                displayBioElem.textContent = storedBio;
            } else {
                const defaultBio = "热爱前端与设计，保持好奇，持续学习。";
                bioInput.value = defaultBio;
                displayBioElem.textContent = defaultBio;
            }
            if (storedAvatar && storedAvatar.startsWith('data:image')) {
                avatarImg.src = storedAvatar;
            } else {
                if (!avatarImg.src || avatarImg.src.includes('ui-avatars')) {
                }
            }
        }
        
        function saveToLocalStorage() {
            localStorage.setItem('profile_name', displayNameElem.textContent);
            localStorage.setItem('profile_bio', displayBioElem.textContent);
            const currentAvatarSrc = avatarImg.src;
            if (currentAvatarSrc && (currentAvatarSrc.startsWith('data:image') || currentAvatarSrc.startsWith('blob:'))) {
                if (currentAvatarSrc.startsWith('data:image')) {
                    localStorage.setItem('profile_avatar', currentAvatarSrc);
                }
            } else {
            }
        }
        
        function handleAvatarUploadAndStore(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                showToast('❌ 请选择图片文件', 1200);
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                showToast('⚠️ 图片过大 超过5MB', 1200);
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64 = e.target.result;
                avatarImg.src = base64;
                localStorage.setItem('profile_avatar', base64);
                showToast('🖼️ 头像已更新并保存', 1200);
            };
            reader.onerror = () => showToast('读取失败', 1200);
            reader.readAsDataURL(file);
        }
        
        function bindAvatarEvents() {
            avatarWrapper.addEventListener('click', (e) => {
                e.stopPropagation();
                avatarUploadInput.click();
            });
            avatarUploadInput.addEventListener('change', handleAvatarUploadAndStore);
        }
        
        function saveAndPersist() {
            let newName = nameInput.value.trim();
            let newBio = bioInput.value.trim();
            if (newName === "") {
                newName = "未填写姓名";
                nameInput.value = newName;
            }
            if (newBio === "") {
                newBio = "这个人很懒，还没有填写简介～";
                bioInput.value = newBio;
            }
            displayNameElem.textContent = newName;
            displayBioElem.textContent = newBio;
            localStorage.setItem('profile_name', newName);
            localStorage.setItem('profile_bio', newBio);
            showToast("💾 已保存姓名与简介", 1300);
        }
        
        function initTheme() {
            const isDark = localStorage.getItem('theme_mode') === 'dark';
            if (isDark) {
                document.body.classList.add('dark-theme');
                themeToggle.innerHTML = '☀️ 浅色主题';
            } else {
                document.body.classList.remove('dark-theme');
                themeToggle.innerHTML = '🌙 深色主题';
            }
        }
        
        function toggleTheme() {
            if (document.body.classList.contains('dark-theme')) {
                document.body.classList.remove('dark-theme');
                localStorage.setItem('theme_mode', 'light');
                themeToggle.innerHTML = '🌙 深色主题';
                showToast("🎨 浅色模式已启用", 1000);
            } else {
                document.body.classList.add('dark-theme');
                localStorage.setItem('theme_mode', 'dark');
                themeToggle.innerHTML = '☀️ 浅色主题';
                showToast("🌙 深色模式已启用", 1000);
            }
        }
        
        function init() {
            bindAvatarEvents();
            loadStoredData();
            initTheme();
            
            saveBtn.addEventListener('click', saveAndPersist);
            
            nameInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') saveAndPersist();
            });
            bioInput.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    saveAndPersist();
                }
            });
            themeToggle.addEventListener('click', toggleTheme);
        }
        
        init();
    })();
</script>
</body>
</html>
